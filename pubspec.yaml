name: kar1_fitness
description: A comprehensive gym application for KAR1 Fitness facility
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.5

  # State Management
  provider: ^6.1.1

  # UI Components
  cupertino_icons: ^1.0.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Video Player
  video_player: ^2.8.2
  chewie: ^1.7.5

  # Health Data - Wearable device integration
  health: ^13.3.1
  permission_handler: ^11.3.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  fl_chart: ^0.66.0
  cached_video_player_plus: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/images/logo.png"
